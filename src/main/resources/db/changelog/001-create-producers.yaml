databaseChangeLog:
  - changeSet:
      id: 001
      author: m-troja
      changes:
        - createTable:
            tableName: producers
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true